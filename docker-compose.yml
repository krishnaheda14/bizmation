version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Bizmation — Docker Compose
# Database: Supabase (hosted PostgreSQL — no local postgres container needed)
# Copy .env.example files to .env in each app directory and fill in Supabase
# credentials before running `docker-compose up`.
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../infrastructure/docker/backend.Dockerfile
    container_name: jewelry-backend
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    networks:
      - jewelry-network

  web-app:
    build:
      context: ./apps/web-app
      dockerfile: ../../infrastructure/docker/web-app.Dockerfile
    container_name: jewelry-web-app
    env_file:
      - ./apps/web-app/.env
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web-app:/app
      - /app/node_modules
    networks:
      - jewelry-network

  ai-services:
    build:
      context: ./ai-services
      dockerfile: ../infrastructure/docker/ai-services.Dockerfile
    container_name: jewelry-ai-services
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./ai-services:/app
    networks:
      - jewelry-network

networks:
  jewelry-network:
    driver: bridge
